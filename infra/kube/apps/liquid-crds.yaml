apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: liquid-crds
  namespace: argocd
  labels:
    name: liquid-crds
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: http://gitea.jbernh.xyz:3000/jxbha/liquid
    path: infra/kube/vendor
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
