# https://github.com/tektoncd/triggers/blob/release-v0.27.x/examples/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-triggers-mana-sa
  namespace: dev-tools

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: triggers-mana-eventlistener-binding
subjects:
- kind: ServiceAccount
  name: tekton-triggers-mana-sa
  namespace: dev-tools
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: triggers-mana-eventlistener-clusterbinding
subjects:
- kind: ServiceAccount
  name: tekton-triggers-mana-sa
  namespace: dev-tools
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
