apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secret
  namespace: dev-tools
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-secret
  data:
    - secretKey: HOST
      remoteRef:
        key: dev-tools/gitea
        property: HOST
    - secretKey: NAME
      remoteRef:
        key: dev-tools/gitea
        property: NAME
    - secretKey: USER
      remoteRef:
        key: dev-tools/gitea
        property: USER
    - secretKey: PASSWD
      remoteRef:
        key: dev-tools/gitea
        property: PASSWD
    - secretKey: ALLOWED_HOST_LIST
      remoteRef:
        key: dev-tools/gitea
        property: ALLOWED_HOST_LIST
